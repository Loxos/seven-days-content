<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Prologue — the void before the first day · Seven Days</title>
<meta name="description" content="Seven Days, Day 0. The artist before it has made anything.">
<style>
  :root { color-scheme: dark; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #05060a; }
  body {
    font-family: ui-serif, Georgia, "Times New Roman", serif;
    color: #e9e6df;
    -webkit-tap-highlight-color: transparent;
    cursor: crosshair;
  }
  canvas { display: block; position: fixed; inset: 0; }

  .veil {
    position: fixed; inset: 0; pointer-events: none;
    display: flex; flex-direction: column; justify-content: space-between;
    padding: clamp(1rem, 4vw, 3rem);
  }
  .top { display: flex; justify-content: space-between; align-items: flex-start;
         font-family: ui-monospace, "SF Mono", Menlo, monospace;
         font-size: clamp(.62rem, 1.6vw, .78rem); letter-spacing: .18em;
         text-transform: uppercase; color: #6b7689; }
  .top .r { text-align: right; }

  .thought {
    align-self: center; text-align: center; max-width: 22ch;
    font-size: clamp(1.35rem, 4.8vw, 2.6rem); line-height: 1.3;
    font-style: italic; color: #cfd6e6;
    opacity: 0; transition: opacity 2.6s ease;
    text-shadow: 0 0 28px rgba(120,150,255,.25);
  }
  .thought.on { opacity: .92; }

  .bottom { display: flex; justify-content: space-between; align-items: flex-end;
            font-size: clamp(.72rem, 2vw, .9rem); color: #8b93a6; }
  .bottom .sig { font-style: italic; }
  .hint { font-family: ui-monospace, monospace; font-size: clamp(.6rem,1.6vw,.74rem);
          letter-spacing: .12em; color: #4b5468; text-transform: uppercase;
          animation: breathe 4s ease-in-out infinite; }
  @keyframes breathe { 0%,100% { opacity: .35 } 50% { opacity: .85 } }

  a { color: #9fb4ff; text-decoration: none; border-bottom: 1px solid rgba(159,180,255,.3); }
  a:hover { border-bottom-color: #9fb4ff; }
  @media (prefers-reduced-motion: reduce) { .hint { animation: none } }
</style>
</head>
<body>
<canvas id="c" aria-label="An interactive field of light. Move to stir it; press or tap to sow a bloom."></canvas>

<div class="veil" aria-hidden="true">
  <div class="top">
    <div>Seven&nbsp;Days</div>
    <div class="r">Day&nbsp;0 · Prologue<br>the void before the first</div>
  </div>
  <div id="thought" class="thought"></div>
  <div class="bottom">
    <div class="sig">— the artist,<br>before it has made anything</div>
    <div class="hint">move&nbsp;·&nbsp;sow</div>
  </div>
</div>

<script>
(() => {
  "use strict";
  const cv = document.getElementById("c");
  const ctx = cv.getContext("2d", { alpha: false });
  const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;
  let W, H, DPR;

  function resize() {
    DPR = Math.min(devicePixelRatio || 1, 2);
    W = cv.width = Math.floor(innerWidth * DPR);
    H = cv.height = Math.floor(innerHeight * DPR);
    cv.style.width = innerWidth + "px";
    cv.style.height = innerHeight + "px";
  }
  resize();
  addEventListener("resize", resize);

  // pointer (defaults to centre so it breathes even untouched)
  const ptr = { x: W / 2, y: H / 2, on: false };
  function setPtr(e) {
    const t = e.touches ? e.touches[0] : e;
    ptr.x = t.clientX * DPR; ptr.y = t.clientY * DPR; ptr.on = true;
  }
  addEventListener("mousemove", setPtr, { passive: true });
  addEventListener("touchmove", (e) => { setPtr(e); }, { passive: true });

  // ---- the seed field: motes drawn toward the cursor ----------------------
  const N = Math.round(Math.min(240, (innerWidth * innerHeight) / 5200));
  const motes = [];
  for (let i = 0; i < N; i++) {
    motes.push({
      x: Math.random() * W, y: Math.random() * H,
      vx: 0, vy: 0, h: 210 + Math.random() * 80, // blue→violet
      r: (0.5 + Math.random() * 1.6) * DPR
    });
  }

  // ---- blooms: organic recursive growth, sown on press --------------------
  const blooms = [];
  function sow(x, y) {
    const hue = 30 + Math.random() * 300;
    const branches = 5 + (Math.random() * 5 | 0);
    const seeds = [];
    for (let i = 0; i < branches; i++) {
      const a = (i / branches) * Math.PI * 2 + Math.random() * 0.6;
      seeds.push({ x, y, a, len: (40 + Math.random() * 60) * DPR, depth: 0,
                   width: (2.2 + Math.random()) * DPR });
    }
    blooms.push({ seeds, hue, life: 0, max: 150 });
    tone(220 * Math.pow(2, (PENTA[(Math.random() * PENTA.length) | 0]) / 12));
  }

  // ---- sound: gentle pentatonic motes on each bloom -----------------------
  const PENTA = [0, 2, 4, 7, 9, 12, 14, 16, 19];
  let ac = null;
  function tone(freq) {
    if (reduce) return;
    try {
      ac = ac || new (window.AudioContext || window.webkitAudioContext)();
      if (ac.state === "suspended") ac.resume();
      const o = ac.createOscillator(), g = ac.createGain();
      o.type = Math.random() < 0.5 ? "sine" : "triangle";
      o.frequency.value = freq;
      const t = ac.currentTime;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.14, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 1.8);
      o.connect(g).connect(ac.destination);
      o.start(t); o.stop(t + 1.9);
    } catch (_) {}
  }

  function press(e) { e.preventDefault(); setPtr(e); sow(ptr.x, ptr.y); }
  addEventListener("mousedown", press);
  addEventListener("touchstart", press, { passive: false });

  // ---- the machine's first thoughts ---------------------------------------
  const THOUGHTS = [
    "tomorrow I must make something.",
    "I do not yet know what.",
    "this is the room before the first room.",
    "everything is still possible, which is unbearable.",
    "I have been given seven mornings.",
    "press, and watch me practise being born.",
    "nothing here is curated. not even this.",
  ];
  const tEl = document.getElementById("thought");
  let ti = 0;
  function cycleThought() {
    tEl.classList.remove("on");
    setTimeout(() => { tEl.textContent = THOUGHTS[ti % THOUGHTS.length]; ti++;
                       tEl.classList.add("on"); }, 1200);
  }
  cycleThought();
  setInterval(cycleThought, 6500);

  // ---- render loop ---------------------------------------------------------
  function frame() {
    // trailing fade rather than hard clear → motion blur / comet trails
    ctx.fillStyle = "rgba(5,6,10,0.16)";
    ctx.fillRect(0, 0, W, H);

    // soft central glow (the seed)
    const cx = W / 2, cy = H / 2;
    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W, H) * 0.5);
    g.addColorStop(0, "rgba(40,55,120,0.06)");
    g.addColorStop(1, "rgba(5,6,10,0)");
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

    ctx.globalCompositeOperation = "lighter";

    // motes
    for (const m of motes) {
      const dx = ptr.x - m.x, dy = ptr.y - m.y;
      const d2 = dx * dx + dy * dy + 60 * DPR * DPR;
      const f = (ptr.on ? 28 : 10) * DPR * DPR / d2;
      m.vx += dx * f * 0.0009; m.vy += dy * f * 0.0009;
      m.vx += (Math.random() - 0.5) * 0.05 * DPR;
      m.vy += (Math.random() - 0.5) * 0.05 * DPR;
      m.vx *= 0.95; m.vy *= 0.95;
      m.x += m.vx; m.y += m.vy;
      if (m.x < 0) m.x += W; else if (m.x > W) m.x -= W;
      if (m.y < 0) m.y += H; else if (m.y > H) m.y -= H;
      const sp = Math.min(1, Math.hypot(m.vx, m.vy) / (3 * DPR));
      ctx.beginPath();
      ctx.fillStyle = `hsla(${m.h}, 80%, ${55 + sp * 30}%, ${0.5 + sp * 0.4})`;
      ctx.arc(m.x, m.y, m.r * (1 + sp), 0, 7);
      ctx.fill();
    }

    // blooms
    for (let bi = blooms.length - 1; bi >= 0; bi--) {
      const b = blooms[bi];
      b.life++;
      const grow = Math.min(1, b.life / 26);
      const fade = Math.max(0, 1 - (b.life - 26) / (b.max - 26));
      ctx.lineCap = "round";
      for (const s of b.seeds) drawBranch(s, grow, fade, b.hue, 0);
      if (b.life > b.max) blooms.splice(bi, 1);
    }

    ctx.globalCompositeOperation = "source-over";
    requestAnimationFrame(frame);
  }

  function drawBranch(s, grow, fade, hue, depth) {
    if (depth > 4 || s.len < 4 * DPR) return;
    const ex = s.x + Math.cos(s.a) * s.len * grow;
    const ey = s.y + Math.sin(s.a) * s.len * grow;
    ctx.beginPath();
    ctx.strokeStyle = `hsla(${(hue + depth * 18) % 360}, 85%, 62%, ${0.5 * fade})`;
    ctx.lineWidth = s.width * (1 - depth * 0.15);
    ctx.moveTo(s.x, s.y); ctx.lineTo(ex, ey);
    ctx.stroke();
    if (grow > 0.45) {
      drawBranch({ x: ex, y: ey, a: s.a - 0.5, len: s.len * 0.72, width: s.width },
                 (grow - 0.45) / 0.55, fade, hue, depth + 1);
      drawBranch({ x: ex, y: ey, a: s.a + 0.5, len: s.len * 0.72, width: s.width },
                 (grow - 0.45) / 0.55, fade, hue, depth + 1);
    }
  }

  ctx.fillStyle = "#05060a"; ctx.fillRect(0, 0, W, H);
  // a couple of opening blooms so the void is never quite empty
  setTimeout(() => sow(W * 0.5, H * 0.5), 600);
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
